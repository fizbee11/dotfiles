# Lis of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @plugin "soyuka/tmux-current-pane-hostname"
set -g @plugin 'tmux-plugins/tmux-cpu'
# Set prefix to Ctrl-Space
unbind C-b
set -g prefix M-Space
#set -g prefix `
bind M-Space send-prefix
#bind ` send-prefix
set -g mouse on
# open new panes in the current working directory
bind c new-window -c "#{pane_current_path}"
# start window index at 1 rather than 0
set -g base-index 1
setw -g pane-base-index 1

set -g @catppuccin_window_text " #W" #[bg=red]@#{hostname}#[default] "
set -g @catppuccin_window_current_text " #W" #[bg=red]@#{hostname}#[default] "

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"


# Pass through Ctrl+; to the inner application
# Pass through Ctrl+; to the inner application
bind-key -n C-j send-keys C-j
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)

# make sure tpm git repo is place correnctly at below path
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

run '~/.tmux/plugins/tpm/tpm'
